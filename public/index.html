<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave2Vector Spotify Live</title>
    <style>
      :root {
        --bg: #12151e;
        --panel: #191f2b;
        --ink: #edf3ff;
        --muted: #9ab0d4;
        --accent: #1db954;
      }
      body {
        margin: 0;
        font-family: Avenir Next, Inter, sans-serif;
        background: radial-gradient(circle at 10% 5%, #1f2d4d, var(--bg));
        color: var(--ink);
      }
      main {
        max-width: 900px;
        margin: 30px auto;
        padding: 20px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid #2b3751;
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
      }
      button {
        background: linear-gradient(90deg, #1db954, #38d16e);
        color: #07120b;
        border: none;
        border-radius: 999px;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
        margin-right: 8px;
        margin-bottom: 8px;
      }
      pre {
        background: #0f1420;
        padding: 10px;
        border-radius: 8px;
        overflow: auto;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .track {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .track img {
        width: 60px;
        height: 60px;
        border-radius: 8px;
      }
      .muted {
        color: var(--muted);
      }
      .control-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(170px, 1fr));
        gap: 12px;
        margin-top: 8px;
      }
      .control-grid label {
        display: block;
        font-size: 0.92rem;
      }
      .control-grid input[type="range"],
      .control-grid input[type="number"] {
        width: 100%;
        margin-top: 6px;
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }
      .chip {
        background: #24324a;
        border: 1px solid #35517a;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.8rem;
        color: #cbe0ff;
      }
      @media (max-width: 760px) {
        .row {
          grid-template-columns: 1fr;
        }
        .control-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Wave2Vector Spotify Live</h1>
      <p class="muted">Starter for live recommendations without downloading Spotify audio.</p>

      <div class="panel">
        <button id="login">Connect Spotify</button>
        <button id="seed">Seed famous-song feature cache</button>
        <button id="taste">Refresh taste profile</button>
        <button id="refresh">Refresh now playing + recs</button>
        <button id="poll">Start live polling</button>
        <div class="control-grid">
          <label>
            Diversity <span id="diversity-value">0.20</span>
            <input id="diversity" type="range" min="0" max="1" step="0.05" value="0.2" />
          </label>
          <label>
            Taste weight <span id="taste-weight-value">0.25</span>
            <input id="taste-weight" type="range" min="0" max="1" step="0.05" value="0.25" />
          </label>
          <label>
            Recommendation count
            <input id="k" type="number" min="1" max="20" value="5" />
          </label>
        </div>
      </div>

      <section class="panel">
        <h2>Taste Profile</h2>
        <div id="profile"></div>
      </section>

      <div class="row">
        <section class="panel">
          <h2>Now Playing</h2>
          <div id="now-playing"></div>
        </section>

        <section class="panel">
          <h2>Recommendations</h2>
          <div id="recommendations"></div>
        </section>
      </div>

      <section class="panel">
        <h2>Debug</h2>
        <pre id="debug"></pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
